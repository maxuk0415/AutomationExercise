name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天 UTC 00:00（台灣時間早上 08:00）自動執行三瀏覽器完整測試
    # 用於監控 WebKit 長期穩定性，與每次 push 的快速回饋分開
    - cron: '0 0 * * *'

jobs:
  test:
    name: "${{ matrix.browser }}"
    runs-on: ubuntu-latest
    # WebKit on GitHub Actions shared runners is inherently flaky when testing
    # a live third-party site (automationexercise.com): ad overlays, consent
    # dialogs, and CSS hover menus behave differently per run depending on
    # network latency and runner performance. Chromium & Firefox are stable.
    # continue-on-error lets the overall CI stay green while still surfacing
    # WebKit results as a visible (but non-blocking) check in the PR/push view.
    continue-on-error: ${{ matrix.browser == 'webkit' }}
    strategy:
      fail-fast: false        # 一個 browser 失敗，不取消其他 browser
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AutomationExercise/AutomationExercise.csproj

      - name: Build
        run: dotnet build AutomationExercise/AutomationExercise.csproj --no-restore

      - name: Install Playwright browsers
        timeout-minutes: 15
        run: |
          PLAYWRIGHT=$(find AutomationExercise/bin -name "playwright.ps1" | head -1)
          echo "Found Playwright script at: $PLAYWRIGHT"
          pwsh -File "$PLAYWRIGHT" install --with-deps ${{ matrix.browser }}

      - name: Run tests
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          dotnet test AutomationExercise/AutomationExercise.csproj \
            --no-build \
            --logger "trx;LogFileName=results-${{ matrix.browser }}.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: TestResults/results-${{ matrix.browser }}.trx
